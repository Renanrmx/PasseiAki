<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="historyPageTitle">Últimos acessos</title>
    <link rel="stylesheet" href="history.css" />
  </head>
  <body>
    <h1 data-i18n="historyPageTitle">Últimos acessos</h1>
    <div class="history-search">
      <input
        id="history-search"
        type="search"
        autocomplete="off"
        data-i18n="historySearchPlaceholder"
        data-i18n-attr="placeholder"
        placeholder="Buscar endereço"
      />
    </div>
    <ul id="history-list" style="flex: 1;"></ul>
    <footer>
      <div class="footer-text">
        <span data-i18n="recentOnlyNote">Exibidos apenas os últimos acessos</span><br />
        <span data-i18n="exportAllNote">Todos os registros disponiveis ao exportar os dados</span>
      </div>
      <div style="display:flex; gap:8px;">
        <button class="export-btn" id="export-history-btn" data-export-addresses-btn data-i18n="exportVisits">Exportar acessos</button>
        <button class="export-btn" data-import-addresses data-i18n="importAddresses">Importar endereços</button>
      </div>
    </footer>
    <div class="overlay" id="confirm-overlay">
      <div class="modal">
        <p id="confirm-text" data-i18n="deleteConfirm">Excluir este registro de acesso?</p>
        <div class="modal-actions">
          <button class="btn" id="confirm-cancel" data-i18n="cancel">Cancelar</button>
          <button class="btn" id="confirm-ok" data-i18n="delete">Excluir</button>
        </div>
      </div>
    </div>
    <script src="i18n.js"></script>
    <script src="init-i18n.js"></script>
    <script src="../shared/messages.js"></script>
    <script src="../shared/records.js"></script>
    <script src="loading.js"></script>
    <script src="import.js"></script>
    <script src="export.js"></script>
    <script src="history.js"></script>
  </body>
</html>
