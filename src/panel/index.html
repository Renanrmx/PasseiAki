<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="extensionName">Passei Aki</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <header class="header">
      <h1 data-i18n="extensionName">Passei Aki</h1>
      
      <div style="display:flex; align-items:center; gap:8px;">
        <span class="match-inline" id="match-status-inline"></span>
        <button
          class="btn icon-btn"
          id="settings-btn"
          data-i18n="settingsPageTitle"
          data-i18n-attr="title,aria-label"
        >
          <span aria-hidden="true">⚙️</span>
          <span class="icon-tooltip" data-i18n="settingsPageTitle">Configurações</span>
        </button>
      </div>
    </header>

    <div class="summary">
      <div class="card">
        <strong data-i18n="lastVisitLabel">Última visita</strong>
        <span class="value" id="last-visit-date">—</span>
        <span class="value value-small" id="last-visit-time">—</span>
      </div>
      <div class="card">
        <strong data-i18n="visitsThisPage">Visitas desta pagina</strong>
        <span class="value" id="total-visits">0</span>
      </div>
    </div>

    <div class="menu-row">
      <div class="menu-actions">
        <button class="btn default-btn" id="history-btn">
          <span aria-hidden="true">🕒</span>
          <span data-i18n="historyPageTitle">Últimos acessos</span>
        </button>
      </div>
      <div class="support-button" id="support-container">
        <span class="support-tooltip" data-i18n="supportProjectTooltip">Apoiar este projeto</span>
        <a
          href="https://www.buymeacoffee.com/renanrmx"
          target="_blank"
          rel="noreferrer"
          id="support-btn"
        >
          <img src="assets/buymeacoffee.png" alt="Buy Me A Coffee" />
        </a>
      </div>
    </div>

    <div id="partial-container" style="display:none">
      <h2 data-i18n="recentSimilar">Semelhantes recentes</h2>
      <ul id="partial-list"></ul>
    </div>

    <div class="download-badge-container" id="download-badge-container" style="display:none;">
      <div class="download-badge-header">
        <h2 data-i18n="downloadListTitle">Downloads já acessados</h2>
        <button class="download-badge-dismiss" id="download-badge-dismiss" data-i18n="downloadBadgeDismiss">Ignorar</button>
      </div>
      <ul id="download-badge-list"></ul>
    </div>


    <script src="i18n.js"></script>
    <script src="../shared/messages.js"></script>
    <script src="../shared/records.js"></script>
    <script src="index.js"></script>
  </body>
</html>
